<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Docker Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>DevOps Project with Docker</h1>
    <p>Built using CMD, GitHub, GitHub Actions, GitHub Pages, Jenkins, and Docker.</p>
    <button onclick="showMessage()">Check Status</button>
    <h2 id="msg"></h2>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").innerText = "Build Successful - Deploy Successful";
    }
  </script>
</body>
</html>
